name: ARM64 Apple Silicon Verification & Benchmark

on:
  push:
    branches: [ main ]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'bench/**'
      - 'build_kernel.py'
      - '.github/workflows/arm64_benchmark.yml'
  workflow_dispatch:

jobs:
  arm64-apple-silicon-verify:
    runs-on: macos-14
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy torch

      - name: Build ARM64 NEON Native Library
        run: |
          python build_kernel.py

      - name: Verify Numerical Correctness Suite on ARM64 NEON
        run: |
          python tests/correctness/test_runner.py

      - name: Run Q4 Matmul Microbenchmark on Apple Silicon
        run: |
          python bench/harness/bench_matmul_q4.py

      - name: Run Multi-Threaded Throughput Benchmark on Apple Silicon
        run: |
          python bench/harness/bench_mt_throughput.py

      - name: Upload Benchmark Results & Logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: arm64-apple-silicon-benchmarks
          path: |
            bench/results/
            tests/results/
